plugins {
    id "com.android.application"
    id 'com.google.gms.google-services'
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}


android {
    namespace = "com.sglabs.sems"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    defaultConfig {
        applicationId = "com.sglabs.sems"
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }
 signingConfigs {
    release {
        if (keystorePropertiesFile.exists()) {
            keyAlias = keystoreProperties['keyAlias']
            keyPassword = keystoreProperties['keyPassword']
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword']
            
            if (storeFile == null || keyAlias == null || keyPassword == null || storePassword == null) {
                println("ERROR: One or more keystore properties are missing!")
                throw new GradleException("Keystore properties missing!")
            }
        } else {
            println("ERROR: key.properties file not found!")
            throw new GradleException("key.properties file missing!")
        }
    }
}

    buildTypes {
        release {
            signingConfig = signingConfigs.release 
            minifyEnabled = true 
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1' // Ensure this matches your app's requirements
    implementation platform('com.google.firebase:firebase-bom:32.0.0') // Firebase BOM for version alignment
    implementation 'com.google.firebase:firebase-analytics-ktx' // Firebase Analytics
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0' // Kotlin standard library
}
